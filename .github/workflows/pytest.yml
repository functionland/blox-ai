name: pytest

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout fula-ota for schema fixtures
        uses: actions/checkout@v4
        with:
          repository: functionland/fula-ota
          # main holds the canonical schema (companion commits go directly
          # to main). Prior `ref: blox-ai` pointed at a stale plan branch
          # that no longer tracks schema updates → schema-dep tests
          # silently skipped in CI from 2026-05-27 onward.
          ref: main
          path: fula-ota
        continue-on-error: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: pytest
        env:
          BLOX_AI_FULA_OTA_SCHEMA_DIR: ${{ github.workspace }}/fula-ota/docker/fxsupport/linux/plugins/blox-ai/api
        run: pytest -ra -q
